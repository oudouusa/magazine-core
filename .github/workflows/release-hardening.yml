name: Release hardening

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-hardening:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-rust-1.94-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-rust-1.94-release-

      - name: install ripgrep on Ubuntu
        if: runner.os == 'Linux'
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: install ripgrep on macOS
        if: runner.os == 'macOS'
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

      - name: run release hardening
        run: bash scripts/release-hardening.sh

      - uses: actions/upload-artifact@v4
        with:
          name: release-hardening-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/release-hardening/release-hardening-report.md
            dist/release-hardening/artifacts/*
            dist/release-hardening/dependency-inventory.json
            dist/release-hardening/license-inventory.txt
            dist/release-hardening/secret-scan.txt
            dist/release-hardening/secret-history-scan.txt
