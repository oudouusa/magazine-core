name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-rust-1.94-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-rust-1.94-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: create python test venv
        run: python -m venv .venv

      - name: install python sdk test deps
        run: .venv/bin/python -m pip install -e sdk/python pytest

      - name: python sdk tests
        run: .venv/bin/python -m pytest sdk/python/tests

      - name: golden oracle parity
        run: bash conformance/check_golden.sh
